<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Prayer Clock">

<title>Prayer Clock</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
    display:flex;
    flex-direction:column;
}

.top{
    flex:1;
    display:grid;
    grid-template-columns:1fr 1.5fr 1fr;
    border-bottom:1px solid #222;
}

.section{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.section:not(:last-child){
    border-right:1px solid #222;
}

.label{
    font-size:14px;
    letter-spacing:2px;
    color:#999;
    margin-bottom:12px;
}

.clockWrap{
    display:flex;
    align-items:flex-start;
}

#clock{
    font-size:72px;
    font-weight:800;
    line-height:1;
}

#ampm{
    font-size:24px;
    margin-left:8px;
    margin-top:10px;
    font-weight:600;
}

#currentPrayer{
    font-size:110px;
    font-weight:900;
    color:#41ff57;
    line-height:1;
}

#nextPrayer{
    font-size:52px;
    font-weight:800;
    line-height:1;
}

#countdown{
    margin-top:20px;
    font-size:48px;
    font-weight:800;
    color:#41ff57;
}

.bottom{
    height:34%;
    display:grid;
    grid-template-columns:repeat(5,1fr);
}

.prayer{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    border-right:1px solid #222;
}

.prayer:last-child{
    border-right:none;
}

.prayer-name{
    font-size:18px;
    margin-bottom:10px;
    color:#fff;
}

.prayer-time{
    font-size:42px;
    font-weight:700;
}

.active{
    color:#41ff57;
}

@media (orientation: portrait){

    body{
        display:flex;
        justify-content:center;
        align-items:center;
    }

    body::before{
        content:"Rotate Device";
        color:white;
        font-size:30px;
    }

    .top,
    .bottom{
        display:none;
    }
}

</style>
</head>

<body>

<div class="top">

    <div class="section">

        <div class="label">TIME</div>

        <div class="clockWrap">
            <div id="clock">--:--</div>
            <div id="ampm">PM</div>
        </div>

    </div>

    <div class="section">

        <div class="label">CURRENT PRAYER</div>

        <div id="currentPrayer">
            ...
        </div>

    </div>

    <div class="section">

        <div class="label">NEXT PRAYER</div>

        <div id="nextPrayer">
            ...
        </div>

        <div id="countdown">
            ...
        </div>

    </div>

</div>

<div id="prayerGrid" class="bottom"></div>

<script>

const city="Cairo";
const country="Egypt";

let prayerTimes={};

async function loadPrayerTimes(){

    const today=new Date();

    const date=
        today.getDate()+"-"+
        (today.getMonth()+1)+"-"+
        today.getFullYear();

    const response=await fetch(
        `https://api.aladhan.com/v1/timingsByCity/${date}?city=${city}&country=${country}&method=5`
    );

    const data=await response.json();

    prayerTimes={
        Fajr:data.data.timings.Fajr,
        Dhuhr:data.data.timings.Dhuhr,
        Asr:data.data.timings.Asr,
        Maghrib:data.data.timings.Maghrib,
        Isha:data.data.timings.Isha
    };

    renderGrid();
}

function parseTime(time){

    const [h,m]=time.split(":").map(Number);

    const d=new Date();

    d.setHours(h,m,0,0);

    return d;
}

function getPrayerInfo(){

    const now=new Date();

    const prayers=Object.entries(prayerTimes);

    let current="Fajr";
    let next="Dhuhr";
    let nextTime=parseTime(prayers[1][1]);

    for(let i=0;i<prayers.length;i++){

        const prayerTime=parseTime(prayers[i][1]);

        if(now>=prayerTime){

            current=prayers[i][0];

            if(i<prayers.length-1){

                next=prayers[i+1][0];
                nextTime=parseTime(prayers[i+1][1]);

            }else{

                next="Fajr";

                nextTime=parseTime(prayers[0][1]);

                nextTime.setDate(
                    nextTime.getDate()+1
                );
            }
        }
    }

    return{
        current,
        next,
        nextTime
    };
}

function convert12Hour(time){

    let [h,m]=time.split(":");

    h=parseInt(h);

    h=h%12||12;

    return `${h}:${m}`;
}

function renderGrid(){

    if(!Object.keys(prayerTimes).length)
        return;

    const grid=
        document.getElementById("prayerGrid");

    const active=
        getPrayerInfo().current;

    grid.innerHTML="";

    Object.entries(prayerTimes)
    .forEach(([name,time])=>{

        const div=
            document.createElement("div");

        div.className=
            "prayer"+
            (name===active
            ?" active"
            :"");

        div.innerHTML=`
            <div class="prayer-name">
                ${name.toUpperCase()}
            </div>

            <div class="prayer-time">
                ${convert12Hour(time)}
            </div>
        `;

        grid.appendChild(div);

    });
}

function update(){

    const now=new Date();

    const timeString=
        now.toLocaleTimeString(
            "en-US",
            {
                hour:"numeric",
                minute:"2-digit",
                hour12:true
            }
        );

    const [time,ampm]=
        timeString.split(" ");

    document.getElementById("clock")
        .textContent=time;

    document.getElementById("ampm")
        .textContent=ampm;

    if(!Object.keys(prayerTimes).length)
        return;

    const info=
        getPrayerInfo();

    document.getElementById(
        "currentPrayer"
    ).textContent=
        info.current.toUpperCase();

    document.getElementById(
        "nextPrayer"
    ).textContent=
        info.next.toUpperCase();

    const diff=
        info.nextTime-now;

    const hrs=
        Math.floor(diff/1000/60/60);

    const mins=
        Math.floor(diff/1000/60)%60;

    document.getElementById(
        "countdown"
    ).textContent=
        `${hrs}h ${mins}m`;

    renderGrid();
}

loadPrayerTimes();
update();

setInterval(update,1000);
setInterval(loadPrayerTimes,3600000);

</script>

</body>
</html>
